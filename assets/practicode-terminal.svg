  <circle cx="50" cy="18" r="5" fill="#4ade80"/>
  <text class="chrome" x="70" y="23">Practicode · Learn</text>

  <rect class="panel active-border" x="20.5" y="43" width="441" height="522"/>
  <rect x="24" y="35" width="80" height="17" fill="#111827"/>
  <text class="active-title" x="25" y="48">&gt; Lesson</text>

  <rect class="panel border" x="470.5" y="43" width="621" height="522"/>
  <rect x="474" y="35" width="158" height="17" fill="#111827"/>
  <text class="title" x="475" y="48">Code · Exercise.py</text>

  <text class="lesson-title" x="25" y="66">1/4 · Language delta: Exact output with print</text>
  <text class="text" x="25" y="102">Unlike a raw stream write, print supplies both a</text>
  <text class="text" x="25" y="120">separator and a line ending. Establishing this</text>
  <text class="text" x="25" y="138">boundary early makes every later Python</text>
  <text class="text" x="25" y="156">exercise's output contract explicit.</text>

  <text class="section" x="25" y="192">Exercise</text>
  <text class="text" x="25" y="228">Read the name and score, then configure print so</text>
  <text class="text" x="25" y="246">they form one colon-delimited record terminated</text>
  <text class="text" x="25" y="264">by exactly one newline.</text>

  <text class="section" x="25" y="300">Input</text>
  <rect x="43" y="322" width="60" height="18" fill="#1f2937"/>
  <text class="code" x="43" y="336"> Ada 7 </text>

  <text class="section" x="25" y="372">Output</text>
  <rect x="43" y="394" width="60" height="18" fill="#1f2937"/>
  <text class="code" x="43" y="408"> Ada:7 </text>

  <text class="text" x="475" y="66">&gt;  1 import sys</text>
  <text class="text" x="475" y="84">   2</text>
  <text class="text" x="475" y="102">   3 name, score = sys.stdin.read().split()</text>
  <text class="text" x="475" y="120">   4 # TODO: choose print separators and a line ending for the requi</text>
  <text class="text" x="475" y="138">   5 print(name, score)</text>
  <text class="text" x="475" y="156">   6</text>

  <rect y="574" width="1112" height="18" fill="#152033"/>
  <text class="status" x="25" y="588">Enter: Next</text>
  <text class="text" x="16" y="606">Command: Type /, move with up/down, Enter runs</text>
